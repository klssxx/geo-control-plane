schema_version: "1.0"
name: "geo-control-plane-public"
status: "PUBLIC_TEMPLATE"
purpose: "safety-first orchestration template for AI coding agents"
routes:
  - "AUDIT"
  - "PLAN"
  - "DOCS"
  - "CODE"
  - "VALIDATE"
  - "DIVERGE"
  - "RED_REVIEW"
risk_vocabulary:
  - "GREEN"
  - "YELLOW"
  - "ORANGE"
  - "RED"
gates:
  workspace_doc_write: "AUTHORIZE_GEO_WORKSPACE_DOC_WRITE"
  validation_execution: "AUTHORIZE_GEO_VALIDATION_EXECUTION"
  code_worktree_phase: "AUTHORIZE_GEO_CODE_WORKTREE_PHASE"
  package_change_phase: "AUTHORIZE_GEO_PACKAGE_CHANGE_PHASE"
  graphics_stack_phase: "AUTHORIZE_GEO_GRAPHICS_STACK_PHASE"
public_exclusions:
  - "14_BACKUPS/"
  - "logs/"
  - "runtime dumps"
  - "tokens"
  - "API keys"
  - "credentials"
  - "private prompts"
  - "machine-specific secrets"
example_backup_reference: "14_BACKUPS/example_backup_YYYYMMDD_HHMMSS/"
canonical_files:
  - "README.md"
  - "LICENSE"
  - "SECURITY.md"
  - "CONTRIBUTING.md"
  - "GEO-MANIFEST.yaml"
  - "MASTER_INDEX.md"
  - "QUICKSTART.md"
  - "docs/ARCHITECTURE.md"
  - "docs/WORKFLOWS.md"
  - "docs/GATES.md"
  - "docs/RUNTIME_LIMITS.md"
  - "examples/audit-only-example.md"
  - "examples/safe-code-change-example.md"
  - "examples/red-review-example.md"
  - "examples/diverge-example.md"
  - "examples/validate-yaml-example.md"
  - "scripts/validate_yaml.py"
repository_files:
  - "../README.md"
  - "../LICENSE"
  - "../SECURITY.md"
  - "../CONTRIBUTING.md"
  - "../CODE_OF_CONDUCT.md"
  - "../.gitignore"
  - "../.github/workflows/validate.yml"
validation:
  command: "python scripts/validate_yaml.py"
  expected:
    - "YAML_PARSE_PASS 2"
    - "MANIFEST_INDEX_PASS"
    - "README_REGISTRATION_PASS"
    - "FILES_CHECKED 24"
    - "RESULT PASS"
